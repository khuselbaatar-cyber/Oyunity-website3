<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EduPath — Wireframe Explorations</title>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #f0ede8; font-family: 'DM Sans', sans-serif; }

  /* ── Sketchy shared tokens ── */
  :root {
    --ink: #1a1a1a;
    --ink-light: #555;
    --ink-faint: #aaa;
    --paper: #fafaf8;
    --paper-dark: #ece9e3;
    --blue: #3a6bcc;
    --blue-light: #c5d6f5;
    --gold: #e8b84b;
    --gold-light: #faecc0;
    --stroke: 1.5px solid #1a1a1a;
    --stroke-light: 1px solid #ccc;
    --r: 3px;
  }

  /* ── Sketch utility classes ── */
  .sketch-box {
    border: var(--stroke);
    background: var(--paper);
    border-radius: var(--r);
  }
  .sketch-fill { background: var(--paper-dark); border: var(--stroke); border-radius: var(--r); }
  .sketch-blue { background: var(--blue-light); border: 1.5px solid var(--blue); border-radius: var(--r); }
  .sketch-gold { background: var(--gold-light); border: 1.5px solid var(--gold); border-radius: var(--r); }
  .sketch-dark { background: #1a1a1a; border-radius: var(--r); }
  .sketch-stripe {
    background: repeating-linear-gradient(45deg, transparent, transparent 4px, rgba(0,0,0,0.06) 4px, rgba(0,0,0,0.06) 8px);
    border: var(--stroke);
    border-radius: var(--r);
  }

  .label {
    font-family: 'Caveat', cursive;
    font-size: 13px;
    color: var(--ink-light);
    text-align: center;
  }
  .label-sm {
    font-family: 'Caveat', cursive;
    font-size: 11px;
    color: var(--ink-faint);
    text-align: center;
  }
  .section-tag {
    font-family: 'Caveat', cursive;
    font-size: 11px;
    color: var(--ink-faint);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 4px;
  }
  .h-line {
    font-family: 'Caveat', cursive;
    font-weight: 700;
    color: var(--ink);
    line-height: 1.1;
  }
  .body-line {
    font-family: 'Caveat', cursive;
    color: var(--ink-light);
    font-size: 12px;
    line-height: 1.5;
  }

  /* ── Pill / Btn ── */
  .btn-sketch {
    display: inline-flex; align-items: center; justify-content: center;
    padding: 5px 12px;
    border: var(--stroke); border-radius: 3px;
    font-family: 'Caveat', cursive; font-size: 13px;
    white-space: nowrap;
  }
  .btn-filled { background: var(--ink); color: #fff; }
  .btn-blue-filled { background: var(--blue); color: #fff; border-color: var(--blue); }
  .btn-outline { background: transparent; color: var(--ink); }

  /* ── Annotation arrows ── */
  .annotation {
    font-family: 'Caveat', cursive;
    font-size: 11px;
    color: #e55;
    pointer-events: none;
  }

  /* ── Divider ── */
  .wf-divider {
    width: 100%; height: 1px; background: #c8c3bb; margin: 6px 0;
  }

  /* ── Dot nav ── */
  .dot-nav { display: flex; gap: 4px; align-items: center; }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--ink-faint); }
  .dot.active { background: var(--ink); }

  /* ── Hamburger ── */
  .hamburger { display: flex; flex-direction: column; gap: 3px; }
  .ham-line { width: 16px; height: 1.5px; background: var(--ink); border-radius: 1px; }

  /* Panel wrapper */
  .wf-pair { display: flex; gap: 24px; align-items: flex-start; }
  .wf-desktop { width: 560px; flex-shrink: 0; }
  .wf-mobile { width: 180px; flex-shrink: 0; }
  .wf-label {
    font-family: 'Caveat', cursive;
    font-size: 14px;
    color: var(--ink-light);
    margin-bottom: 6px;
    display: flex; align-items: center; gap: 6px;
  }
  .wf-label svg { opacity: 0.5; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

/* ═══════════════════════════════════════════
   SHARED SKETCH PRIMITIVES
═══════════════════════════════════════════ */
const Box = ({w,h,className='sketch-fill',style={},children}) => (
  <div className={className} style={{width:w,height:h,...style}}>{children}</div>
);
const ImgPlaceholder = ({w,h,label,style={}}) => (
  <div className="sketch-stripe" style={{width:w,height:h,display:'flex',alignItems:'center',justifyContent:'center',...style}}>
    <span className="label-sm">{label}</span>
  </div>
);
const TextLine = ({w='100%',h=8,style={}}) => (
  <div style={{width:w,height:h,background:'#ccc',borderRadius:2,marginBottom:4,...style}}></div>
);
const CardOutline = ({w,h,children,style={}}) => (
  <div className="sketch-box" style={{width:w,height:h,padding:10,...style}}>{children}</div>
);
const Btn = ({label,filled,blue,style={}}) => (
  <div className={`btn-sketch ${filled?'btn-filled':blue?'btn-blue-filled':'btn-outline'}`} style={style}>{label}</div>
);
const IconBox = ({size=24,style={}}) => (
  <div style={{width:size,height:size,border:'1.5px solid #555',borderRadius:3,display:'flex',alignItems:'center',justifyContent:'center',...style}}>
    <div style={{width:size*0.4,height:size*0.4,border:'1.5px solid #555',borderRadius:'50%'}}></div>
  </div>
);

/* ═══════════════════════════════════════════
   DIRECTION A — NOTION-STYLE (minimal, editorial)
   Desktop 560px wide — full landing page
═══════════════════════════════════════════ */
const DirectionA_Desktop = () => {
  const W = 560;
  return (
    <div style={{width:W,background:'#fafaf8',border:'2px solid #1a1a1a',borderRadius:4,overflow:'hidden',fontFamily:'Caveat, cursive'}}>

      {/* NAV */}
      <div style={{padding:'10px 24px',borderBottom:'1.5px solid #ddd',display:'flex',alignItems:'center',justifyContent:'space-between',background:'rgba(250,250,248,0.95)'}}>
        <span className="h-line" style={{fontSize:16}}>EduPath</span>
        <div style={{display:'flex',gap:16,alignItems:'center'}}>
          {['Үйлчилгээ','Хэрхэн','Сургуулиуд','Холбоо'].map(t=>(
            <span key={t} style={{fontFamily:'Caveat,cursive',fontSize:12,color:'#555'}}>{t}</span>
          ))}

        </div>
      </div>

      {/* HERO */}
      <div style={{padding:'48px 24px 36px',borderBottom:'1.5px solid #eee'}}>
        <div className="sketch-blue" style={{display:'inline-block',padding:'2px 8px',marginBottom:12,fontSize:11}}>
          <span>✦ 200+ оюутан амжилтанд хүрсэн</span>
        </div>
        <div className="h-line" style={{fontSize:38,lineHeight:1.05,marginBottom:16,maxWidth:400}}>

        </div>
        <div className="body-line" style={{maxWidth:340,marginBottom:20}}>

        <div style={{display:'flex',gap:10}}>

      {/* SERVICES */}
      <div style={{padding:'28px 24px',borderBottom:'1.5px solid #eee'}}>

        <div className="h-line" style={{fontSize:22,marginBottom:16}}>Бид юу хийдэг вэ?</div>

      </div>

      {/* HOW IT WORKS */}
      <div style={{padding:'28px 24px',borderBottom:'1.5px solid #eee',background:'#f5f3ef'}}>

        <div style={{display:'flex',gap:0,position:'relative'}}>
          <div style={{position:'absolute',top:20,left:24,right:24,height:'1.5px',background:'#ccc',zIndex:0}}></div>
          {[['1','Бүртгэл'],['2','Зөвлөгөө'],['3','Бэлдэлт'],['4','Амжилт']].map(([n,l],i)=>(

                <span className="h-line" style={{fontSize:16,color:i===3?'#fff':'#1a1a1a'}}>{n}</span>

      {/* SCHOOLS */}
      <div style={{padding:'28px 24px',borderBottom:'1.5px solid #eee',background:'#18233a'}}>

        <div className="h-line" style={{fontSize:22,color:'#fff',marginBottom:16}}>Хамтрагч их сургуулиуд</div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(5,1fr)',gap:8}}>
          {['PKU','Fudan','SJTU','NJU','HIT','ZJU','CUHK','THU','RUC','ECNU'].map(s=>(
            <div key={s} style={{padding:'6px 4px',border:'1px solid #2e4572',borderRadius:3,textAlign:'center',background:'rgba(255,255,255,0.05)'}}>
              <span style={{fontFamily:'Caveat,cursive',fontSize:12,color:'#c5d6f5'}}>{s}</span>
            </div>
          ))}
        </div>
      </div>

      {/* TESTIMONIALS */}
      <div style={{padding:'28px 24px',borderBottom:'1.5px solid #eee'}}>
        <div className="section-tag">Амжилтын түүхүүд</div>
        <div className="h-line" style={{fontSize:22,marginBottom:16}}>Оюутнуудын туршлага</div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:12}}>
          {[
            {name:'Номин Д.',school:'PKU, Beijing',year:"'24"},
            {name:'Анхбаяр Т.',school:'Fudan, Shanghai',year:"'23"},
            {name:'Цэнд-Аюуш Б.',school:'SJTU, Shanghai',year:"'24"},
          ].map(t=>(
            <CardOutline key={t.name} w="100%" style={{minHeight:90}}>
              <div style={{display:'flex',gap:6,alignItems:'center',marginBottom:8}}>
                <div style={{width:28,height:28,borderRadius:'50%',background:'#e0dbd4',border:'1.5px solid #aaa'}}></div>
                <div>
                  <div className="h-line" style={{fontSize:12}}>{t.name}</div>
                  <div className="label-sm">{t.school} {t.year}</div>
                </div>
              </div>
              <TextLine w="100%" h={6}/>
              <TextLine w="80%" h={6}/>
              <TextLine w="90%" h={6}/>
            </CardOutline>
          ))}
        </div>
      </div>

      {/* CTA */}
      <div style={{padding:'36px 24px',borderBottom:'1.5px solid #eee',textAlign:'center',background:'#3a6bcc'}}>
        <div className="h-line" style={{fontSize:30,color:'#fff',marginBottom:8}}>Өнөөдөр эхэл</div>
        <div style={{fontFamily:'Caveat,cursive',fontSize:13,color:'rgba(255,255,255,0.75)',marginBottom:18}}>
          Чиний ирээдүй нэг алхамаас эхэлнэ
        </div>
        <Btn label="Үнэгүй зөвлөгөө авах →" style={{background:'#fff',color:'#3a6bcc',borderColor:'transparent',fontSize:14,padding:'7px 20px'}}/>
      </div>

      {/* CONTACT */}
      <div style={{padding:'28px 24px',borderBottom:'1.5px solid #eee'}}>
        <div className="section-tag">Холбоо барих</div>
        <div className="h-line" style={{fontSize:22,marginBottom:14}}>Бидэнтэй холбогдох</div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,maxWidth:400}}>
          {['Нэр','Утасны дугаар'].map(p=>(
            <div key={p} className="sketch-box" style={{padding:'6px 10px',height:32}}>
              <span className="label-sm">{p}</span>
            </div>
          ))}
          <div className="sketch-box" style={{gridColumn:'1/-1',padding:'6px 10px',height:32}}>
            <span className="label-sm">Сонирхсон үйлчилгээ ▾</span>
          </div>
          <div className="sketch-box" style={{gridColumn:'1/-1',padding:'6px 10px',height:56}}>
            <span className="label-sm">Мессеж...</span>
          </div>
        </div>
        <div style={{marginTop:10}}>
          <Btn label="Илгээх →" blue/>
        </div>
      </div>

      {/* FOOTER */}
      <div style={{padding:'12px 24px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <span className="h-line" style={{fontSize:13}}>EduPath © 2024</span>
        <div style={{display:'flex',gap:12}}>
          {['Facebook','Instagram','WeChat'].map(s=>(
            <span key={s} style={{fontFamily:'Caveat,cursive',fontSize:11,color:'#aaa'}}>{s}</span>
          ))}
        </div>
      </div>
    </div>
  );
};

/* ═══════════════════════════════════════════
   DIRECTION B — APPLE-STYLE (dramatic, full-bleed)
═══════════════════════════════════════════ */
const DirectionB_Desktop = () => {
  const W = 560;
  return (
    <div style={{width:W,background:'#fafaf8',border:'2px solid #1a1a1a',borderRadius:4,overflow:'hidden',fontFamily:'Caveat, cursive'}}>

      {/* NAV — translucent */}
      <div style={{padding:'10px 24px',borderBottom:'1px solid rgba(0,0,0,0.08)',display:'flex',alignItems:'center',justifyContent:'space-between',background:'rgba(250,250,248,0.92)'}}>
        <span className="h-line" style={{fontSize:16}}>EduPath</span>
        <div style={{display:'flex',gap:16,alignItems:'center'}}>
          {['Үйлчилгээ','Хэрхэн','Сургуулиуд'].map(t=>(
            <span key={t} style={{fontFamily:'Caveat,cursive',fontSize:12,color:'#555'}}>{t}</span>

      </div>

      {/* HERO — full bleed image */}
